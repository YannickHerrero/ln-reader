<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <meta name="description" content="Votre bibliothèque locale de light novels." />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>LN Reader</title>
    <script>
      (() => {
        try {
          const stored = localStorage.getItem('ln-reader-theme')
          const theme = stored === 'light' || stored === 'dark'
            ? stored
            : matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          document.documentElement.dataset.theme = theme
          document.documentElement.style.colorScheme = theme
          document.querySelector('meta[name="theme-color"]').content = theme === 'dark' ? '#09090b' : '#f5f5f7'
        } catch { /* The React provider will apply a theme. */ }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
